name: ch_sync
description: "Extract data from ClickHouse and POST to httpbin"
model: "SELECT name, database FROM system.tables LIMIT 10"
destination:
  type: rest_api
  url: "https://httpbin.org/post"
  method: POST
  body_template: |
    {
      "table_name": "{{ row.name }}",
      "db": "{{ row.database }}"
    }
sync:
  mode: full
  batch_size: 5
